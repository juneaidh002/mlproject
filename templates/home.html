<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .title {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .title h1 {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .title p {
            color: #666;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: #444;
            font-weight: bold;
            font-size: 25px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 30px;
            transition: 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #4f46e5;
            outline: none;
            box-shadow: 0 0 8px rgba(79,70,229,0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #4338ca;
        }

        .result {
            margin-top: 25px;
            text-align: center;
            font-size: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #f3f4f6;
        }

        .result h2 {
            color: #16a34a;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>📚 Student Exam Performance Indicator</h1>
        <p>Predict Mathematics Score Based on Student Information</p>
    </div>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option selected disabled value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Race / Ethnicity</label>
            <select name="ethnicity" required>
                <option selected disabled value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education" required>
                <option selected disabled value="">Select Education</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's Degree</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lunch Type</label>
            <select name="lunch" required>
                <option selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">Free / Reduced</option>
                <option value="standard">Standard</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test Preparation Course</label>
            <select name="test_preparation_course" required>
                <option selected disabled value="">Select Course Status</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Reading Score (0-100)</label>
            <input type="number"
                   name="reading_score"
                   min="0"
                   max="100"
                   placeholder="Enter Reading Score"
                   required>
        </div>

        <div class="form-group">
            <label>Writing Score (0-100)</label>
            <input type="number"
                   name="writing_score"
                   min="0"
                   max="100"
                   placeholder="Enter Writing Score"
                   required>
        </div>

        <button type="submit" class="btn">
            Predict Maths Score
        </button>

    </form>

    {% if results %}
    <div class="result">
        <h2>🎯 Predicted Maths Score: {{ results }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
